<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nox VPN - Fast & Secure VPN</title>
    <meta name="description"
        content="Nox VPN - Free, fast and secure VPN powered by WireGuard protocol. Protect your privacy with modern cryptography.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            text-align: center;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            margin-bottom: 24px;
        }

        h1 {
            color: #00e5cc;
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .tagline {
            color: #999;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            text-align: center;
        }

        .feature h3 {
            color: #00e5cc;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .feature p {
            color: #888;
            font-size: 0.85rem;
        }

        .badge img {
            height: 60px;
        }

        .links {
            margin-top: 32px;
        }

        .links a {
            color: #00e5cc;
            text-decoration: none;
            margin: 0 16px;
            font-size: 0.9rem;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="https://raw.githubusercontent.com/MelikYLDRM/NoxVPN/main/assets/images/noxlogo.png" alt="Nox VPN"
            class="logo">
        <h1>Nox VPN</h1>
        <p class="tagline">Fast, secure, and free VPN powered by WireGuard</p>
        <div class="features">
            <div class="feature">
                <h3>WireGuard Protocol</h3>
                <p>State-of-the-art cryptography</p>
            </div>
            <div class="feature">
                <h3>No Logs</h3>
                <p>Zero traffic logging policy</p>
            </div>
            <div class="feature">
                <h3>Fast & Light</h3>
                <p>Minimal overhead, maximum speed</p>
            </div>
        </div>
        <div class="links">
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="https://github.com/MelikYLDRM/NoxVPN">GitHub</a>
        </div>
    </div>
</body>

</html>
